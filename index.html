<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Average Down Saham</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #001F3F 0%, #003D7A 25%, #0066CC 50%, #5499C7 75%, #ADD8E6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 31, 63, 0.4);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #001F3F;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #555;
            font-size: 1.1em;
        }

        .calculator-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .calculator-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .input-section h2 {
            color: #0066CC;
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 3px solid #0066CC;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
            padding: 20px;
            background: #f0f5ff;
            border-radius: 10px;
            border-left: 4px solid #0066CC;
        }

        .input-group h3 {
            color: #001F3F;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0066CC;
            box-shadow: 0 0 5px rgba(0, 102, 204, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, #0066CC 0%, #0052A3 100%);
            color: white;
            flex: 1;
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #0052A3 0%, #003D7A 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.4);
        }

        .btn-remove {
            background: #ff6b6b;
            color: white;
            padding: 12px 15px;
        }

        .btn-remove:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .btn-remove:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .input-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .input-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-item-info {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .input-item-data {
            color: #333;
        }

        .input-item-label {
            color: #999;
            font-size: 0.85em;
        }

        .result-section {
            background: linear-gradient(135deg, #001F3F 0%, #003D7A 50%, #0066CC 100%);
            padding: 30px;
            border-radius: 10px;
            color: white;
        }

        .result-section h2 {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }

        .result-item {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95em;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
        }

        .result-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .clear-button {
            background: #ff6b6b;
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        .clear-button:hover {
            background: #ff5252;
        }

        .info-box {
            background: #e8f4fd;
            border-left: 4px solid #0066CC;
            padding: 15px;
            border-radius: 8px;
            margin-top: 30px;
            color: #003D7A;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .info-box strong {
            display: block;
            margin-bottom: 10px;
            color: #001F3F;
        }

        .tooltip-text {
            color: #666;
            font-size: 0.85em;
            margin-top: 3px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
